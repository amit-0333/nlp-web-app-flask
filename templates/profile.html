<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLP APP | Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
    135deg,
    #FFDDE2,
    #FFF2E1
    );

}

.container{

    width:450px;

    padding:35px;

    background:rgba(255,255,255,0.75);

    border-radius:25px;

    backdrop-filter:blur(10px);

    box-shadow:
    0px 8px 25px rgba(0,0,0,0.1);

    text-align:center;

}

h1{

    color:#8B5E5E;
    margin-bottom:10px;

}

.subtitle{

    color:#777;
    margin-bottom:25px;

}

ul{

    list-style:none;

}

li{

    margin-bottom:18px;

}

a{

    display:block;

    background:#FFF8F6;

    padding:15px;

    border-radius:12px;

    text-decoration:none;

    color:#8B5E5E;

    font-weight:bold;

    transition:0.3s;

}

a:hover{

    background:#F8B4C4;
    color:white;

    transform:scale(1.03);

}

</style>

</head>

<body>

<div class="container">

<h1>NLP APP 🌸</h1>

What Would You Like To Do?
</p>

</li>

<li>

</a>
</li>

</ul>

</div>

</body>
</html>
