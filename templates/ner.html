<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLP APP | NER</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
    135deg,
    #FFDDE2,
    #FFF2E1
    );
}

.container{

    width:500px;
    padding:35px;

    background:rgba(255,255,255,0.75);

    border-radius:25px;

    backdrop-filter:blur(10px);

    box-shadow:
    0px 8px 25px rgba(0,0,0,0.1);

    text-align:center;

}

h1{
    color:#8B5E5E;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

textarea{

    width:100%;
    height:150px;

    padding:15px;

    border:none;
    border-radius:12px;

    background:#FFF8F6;

    resize:none;

    outline:none;

}

textarea:focus{

    border:2px solid #F8B4C4;

}

button{

    width:100%;
    margin-top:20px;
    padding:12px;

    border:none;
    border-radius:12px;

    background:#F8B4C4;

    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

}

button:hover{

    transform:scale(1.02);

}

a{

    text-decoration:none;
    color:#D16B86;
    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>NLP APP 🌸</h1>

<p class="subtitle">Named Entity Recognition</p>

<form action="/perform_ner" method="POST">

<textarea
name="text"
placeholder="Enter text for entity recognition...">
</textarea>

<button type="submit">
Analyze Text
</button>

</form>


{% if result %}

<div style="
margin-top:20px;
padding:15px;
background:#FFF8F6;
border-radius:12px;
text-align:left;">

<h3 style="color:#8B5E5E;">
NER Result 🌸
</h3>

<pre>{{ result }}</pre>

</div>

{% endif %}


<br>

<a href="/profile">
← Back to Profile
</a>

</div>

</body>
</html>
